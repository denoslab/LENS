site_name: LENS Documentation
site_description: Role-aware multi-agent grading pipeline for clinical ED handoff summaries
repo_url: https://github.com/denoslab/LENS

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

nav:
  - Home: index.md
  - API Reference:
      - CLI: api/cli.md
      - Orchestrator: api/orchestrator.md
      - Scoring: api/scoring.md
      - LLM Scoring: api/llm_scoring.md
      - Config: api/config.md
      - Validation: api/validation.md
